<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Завдання 3</title>
</head>
<body style="font-family: Arial, sans-serif; padding: 20px;">
    <h2>Завдання 3 (Час)</h2>
    <a href="index.html">🔙 Повернутися до меню</a>
    <script>
        let hStr = prompt("Введіть кількість годин (0-23):", "");
        let mStr = prompt("Введіть кількість хвилин (0-59):", "");

        let h = parseInt(hStr);
        let m = parseInt(mStr);

        if (isNaN(h) || isNaN(m) || h < 0 || h > 23 || m < 0 || m > 59) {
            alert("Помилка: Введено некоректний час. Години мають бути від 0 до 23, хвилини від 0 до 59.");
        } else {
            m++; // додаємо 1 хвилину
            if (m === 60) {
                m = 0;
                h++;
                if (h === 24) {
                    h = 0;
                }
            }
            
            // Додаємо нулі попереду, якщо число менше 10 (наприклад, 09:05 замість 9:5)
            let hFormated = h < 10 ? "0" + h : h;
            let mFormated = m < 10 ? "0" + m : m;

            alert(`Через 1 хвилину буде: ${hFormated}:${mFormated}`);
        }
    </script>
</body>
</html>
