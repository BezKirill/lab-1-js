<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Завдання 4</title>
    <style>
        table { border-collapse: collapse; margin-top: 20px; }
        td { width: 30px; height: 30px; border: 1px solid #ffffff; }
        .color-yellow { background-color: #ffcc00; }
        .color-blue { background-color: #000099; }
    </style>
</head>
<body style="font-family: Arial, sans-serif; padding: 20px;">
    <h2>Завдання 4 (Таблиця - Варіант 1)</h2>
    <a href="index.html">🔙 Повернутися до меню</a><br><br>
    <script>
        let n = 10;
        document.write("<table>");
        for (let i = 1; i <= n; i++) {
            document.write("<tr>");
            for (let j = 1; j <= n; j++) {
                // Якщо координата стовпця більше координати рядка — колір синій, інакше — жовтий
                let my_style = (j > i) ? "class='color-blue'" : "class='color-yellow'";
                document.write("<td " + my_style + "></td>");
            }
            document.write("</tr>");
        }
        document.write("</table>");
    </script>
</body>
</html>
